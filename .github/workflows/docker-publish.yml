name: Build and Push Docker Image

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  packages: write
  contents: read

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Docker Hub
        if: ${{ secrets.DOCKER_USER != '' && secrets.DOCKER_TOKEN != '' }}
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Lowercase the repo owner
        id: prep
        run: echo "repo_lower=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ steps.prep.outputs.repo_lower }}/incus-ui-cn:latest
            ghcr.io/${{ steps.prep.outputs.repo_lower }}/incus-ui-cn:${{ github.ref_name }}
            ${{ secrets.DOCKER_USER }}/incus-ui-cn:latest
            ${{ secrets.DOCKER_USER }}/incus-ui-cn:${{ github.ref_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
